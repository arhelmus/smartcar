name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Each job provisions the runner with `make init` (submodules, system
# deps, .env.local seed, cargo-audit / cargo-sweep, init stamp) before
# running its targeted check, so the CI setup mirrors local dev instead
# of duplicating apt-get / submodule incantations per job.

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - uses: ./.github/actions/setup-init
      - run: make init
      - run: cargo fmt --all -- --check
        working-directory: server

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "server -> target" }
      - uses: ./.github/actions/setup-init
      - run: make init
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: server

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "server -> target" }
      - uses: ./.github/actions/setup-init
      - run: make init
      - run: cargo test --workspace
        working-directory: server

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-init
      - run: make init
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: server

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "server -> target" }
      - uses: ./.github/actions/setup-init
      - run: make init
      - run: cargo check --workspace
        working-directory: server

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-init
      - run: make init
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: server/Cargo.toml
