[defaults]
inventory = ./inventory.yml
roles_path = ./roles
host_key_checking = False
retry_files_enabled = False
# community.general.yaml callback was removed in 12.0; the built-in
# default callback with callback_result_format=yaml is the replacement.
stdout_callback = default
callback_result_format = yaml
forks = 5
interpreter_python = /usr/bin/python3

[ssh_connection]
pipelining = True
