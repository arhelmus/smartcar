- name: Ensure persistent journal directory exists
  ansible.builtin.file:
    path: "{{ journal_persistent_path }}"
    state: directory
    owner: root
    group: systemd-journal
    mode: "02755"

- name: Symlink /var/log/journal to persistent path
  ansible.builtin.file:
    src: "{{ journal_persistent_path }}"
    dest: /var/log/journal
    state: link
    force: true

- name: Ensure journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy journald drop-in
  ansible.builtin.template:
    src: 10-smartcar.conf.j2
    dest: /etc/systemd/journald.conf.d/10-smartcar.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald
