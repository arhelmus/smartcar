- name: Deploy usb0 network config
  ansible.builtin.template:
    src: 30-usb0.network.j2
    dest: /etc/systemd/network/30-usb0.network
    owner: root
    group: root
    mode: "0644"
  notify: Reload networkd

# wlan0 STA config for the AAW path. Deployed unconditionally — keeps
# --transport bt reachable without re-provisioning — and is no-op on boards
# that stay in --transport usb because no wpa_supplicant runs.
- name: Deploy wlan0 network config (AAW STA)
  ansible.builtin.template:
    src: 40-wlan0.network.j2
    dest: /etc/systemd/network/40-wlan0.network
    owner: root
    group: root
    mode: "0644"
  notify: Reload networkd

- name: Ensure /etc/wpa_supplicant exists
  ansible.builtin.file:
    path: /etc/wpa_supplicant
    state: directory
    owner: root
    group: root
    mode: "0755"

# Stub config. The real (PSK-bearing) config is written to /run/aaw-wpa.conf
# by smartcar-server at AAW-bootstrap time — see aap-transport/src/bt/wpa.rs.
# Mode 0600 because future hand-edits with PSKs land in this file.
- name: Deploy wpa_supplicant-wlan0 stub
  ansible.builtin.template:
    src: wpa_supplicant-wlan0.conf.j2
    dest: /etc/wpa_supplicant/wpa_supplicant-wlan0.conf
    owner: root
    group: root
    mode: "0600"
    # force=no so a hand-edited config survives re-provisioning.
    force: false

- name: Enable systemd-networkd
  ansible.builtin.systemd:
    name: systemd-networkd.service
    enabled: true
    state: started
