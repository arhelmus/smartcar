# Load libcomposite so /sys/kernel/config/usb_gadget/ exists in both boot
# modes. In dev mode libcomposite would also be pulled in transitively by
# modprobe g_ether (run by g_ether-load.service), but in car mode that
# service is skipped and nothing else loads it — without libcomposite,
# smartcar-server cannot mkdir its accessory gadget under configfs and the
# binary exits with ENOENT on the very first setup_gadget call.
libcomposite

# g_ether itself is NOT auto-loaded here. It is loaded conditionally by
# g_ether-load.service AFTER usb-mode.service decides the boot mode:
#   - Dev mode (no jumper)   → g_ether-load runs modprobe g_ether
#   - Car mode (jumper LOW)  → g_ether stays out of the UDC entirely so
#                              smartcar-server can claim it cleanly with no
#                              "device removed" event for the head unit
