# ansible_host / ansible_user come from .env.local (BOARD_HOST / BOARD_USER)
# via lookup('env') — see board/group_vars/all.yml. `make deploy` (which
# calls scripts/deploy.py) loads .env.local before invoking ansible.
all:
  children:
    boards:
      hosts:
        orangepi-dev:
          ansible_host: "{{ board_host }}"
          ansible_user: "{{ board_user }}"
          ansible_python_interpreter: /usr/bin/python3
